name: CHANGELOG Consolidate

# SE-053 Slice 2 activation (batch 26 / SE-062.4)
# Post-merge to main, consolidate CHANGELOG.d/ fragments into CHANGELOG.md
# when threshold exceeded. Commits back to main with automated message.
#
# Safe: idempotent (below threshold = no-op). Read-only except consolidation step.

on:
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.d/**'

permissions:
  contents: write

concurrency:
  group: changelog-consolidate
  cancel-in-progress: false

jobs:
  consolidate:
    name: Consolidate CHANGELOG.d if threshold exceeded
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip consolidate]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check threshold + consolidate if needed
        id: consolidate
        run: |
          set -eo pipefail
          # Count fragments (excluding README.md)
          FRAG_COUNT=$(find CHANGELOG.d -maxdepth 1 -type f -name "*.md" ! -name "README.md" | wc -l)
          echo "Fragment count: $FRAG_COUNT"
          echo "fragment_count=$FRAG_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$FRAG_COUNT" -lt 20 ]; then
            echo "Below threshold (20). No consolidation."
            echo "consolidated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Threshold exceeded. Consolidating..."
          bash scripts/changelog-consolidate-if-needed.sh --threshold 20
          echo "consolidated=true" >> "$GITHUB_OUTPUT"

      - name: Commit consolidated CHANGELOG
        if: steps.consolidate.outputs.consolidated == 'true'
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet CHANGELOG.md CHANGELOG.d/; then
            echo "No actual changes to commit."
            exit 0
          fi

          git add CHANGELOG.md CHANGELOG.d/
          COUNT="${{ steps.consolidate.outputs.fragment_count }}"
          MSG="chore(changelog): auto-consolidate ${COUNT} fragments [skip consolidate]"
          git commit -m "${MSG}" -m "Auto-generated by changelog-consolidate workflow. SE-053 Slice 2 activation."
          git push origin main

      - name: Summary
        if: always()
        run: |
          {
            echo "## CHANGELOG Consolidate"
            echo "- Fragment count: ${{ steps.consolidate.outputs.fragment_count }}"
            echo "- Threshold: 20"
            echo "- Consolidated: ${{ steps.consolidate.outputs.consolidated }}"
          } >> "$GITHUB_STEP_SUMMARY"
