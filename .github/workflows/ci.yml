name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq python3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        run: npm install --prefix scripts

      - name: Validate JSON mock files
        run: |
          echo "Validating mock data JSON files..."
          for f in projects/sala-reservas/test-data/*.json; do
            echo "  Checking $f"
            jq empty "$f" || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "All JSON files are valid."

      - name: Check for sensitive data patterns
        run: |
          echo "Scanning for accidentally committed secrets..."
          # Check for PAT patterns (Azure DevOps PATs: base64 string with = padding, 52 chars typical)
          if grep -rn --include="*.md" --include="*.sh" --include="*.json" --include="*.yml" \
            -E '(^|[^a-zA-Z0-9])[a-zA-Z0-9]{52}[=]*([^a-zA-Z0-9]|$)' \
            --exclude-dir=".git" \
            --exclude-dir="node_modules" \
            . 2>/dev/null | grep -v "mock" | grep -v "example" | grep -v "placeholder" | grep -v "test"; then
            echo "WARNING: Potential secret pattern found. Review the matches above."
          fi
          # Check for AWS access keys
          if grep -rn --include="*.md" --include="*.sh" --include="*.json" --include="*.yml" \
            -E 'AKIA[0-9A-Z]{16}' \
            --exclude-dir=".git" \
            . 2>/dev/null; then
            echo "WARNING: Potential AWS credential found. Review the matches above."
          fi
          # Check for GitHub personal access tokens
          if grep -rn --include="*.md" --include="*.sh" --include="*.json" --include="*.yml" \
            -E '(ghp_|github_pat_)[A-Za-z0-9_]{36,}' \
            --exclude-dir=".git" \
            . 2>/dev/null; then
            echo "WARNING: Potential GitHub token found. Review the matches above."
          fi
          # Check for real org URL patterns (not placeholders)
          if grep -rn --include="*.md" --include="*.sh" \
            "dev.azure.com" . \
            --exclude-dir=".git" \
            | grep -v "TU-ORGANIZACION" \
            | grep -v "miempresa" \
            | grep -v "YOUR-ORG" \
            | grep -v "example" \
            | grep -v "SETUP.md" \
            | grep -v "README.md" \
            | grep -v "CHANGELOG.md" \
            | grep -v "CONTRIBUTING.md"; then
            echo "WARNING: Real Azure DevOps org URL may be present. Review the matches above."
          fi
          echo "Secret scan complete."

      - name: "Gate: PR created via /pr-plan (Rule #25)"
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking that PR was created via /pr-plan..."
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          # Use REST API with pagination (gh pr diff fails with HTTP 406 on PRs >300 files)
          FILES=$(gh api "repos/$REPO/pulls/$PR_NUM/files?per_page=100" --paginate --jq '.[].filename' 2>/dev/null || echo "")
          if echo "$FILES" | grep -qx '.confidentiality-signature'; then
            echo "PASS: PR includes confidentiality signature (pr-plan was run)."
          else
            echo "FAIL: .confidentiality-signature not in PR files."
            echo "Run /pr-plan before creating the PR."
            exit 1
          fi

      - name: Run workspace test suite (mock mode)
        run: |
          chmod +x scripts/test-workspace.sh
          ./scripts/test-workspace.sh --mock
        continue-on-error: false

      - name: Verify required open source files exist
        run: |
          echo "Checking required open source files..."
          required_files=(
            "LICENSE"
            "README.md"
            "CHANGELOG.md"
            "CONTRIBUTING.md"
            "CODE_OF_CONDUCT.md"
            "SECURITY.md"
            "docs/ROADMAP.md"
            ".github/pull_request_template.md"
            ".github/ISSUE_TEMPLATE/bug_report.yml"
            ".github/ISSUE_TEMPLATE/feature_request.yml"
          )
          all_ok=true
          for f in "${required_files[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ MISSING: $f"
              all_ok=false
            fi
          done
          if [ "$all_ok" = false ]; then
            echo "One or more required files are missing."
            exit 1
          fi
          echo "All required files present."

  bats-tests:
    name: BATS Hook Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install BATS and dependencies
        run: |
          # Install BATS (pinned to specific commit for reproducibility)
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          cd /tmp/bats && git fetch --depth 1 origin a8176fd6f4e3cd95f6d9c5dcd47fbc19f09c3b06 && git checkout a8176fd6f4e3cd95f6d9c5dcd47fbc19f09c3b06
          cd - && sudo /tmp/bats/install.sh /usr/local

          # Update package lists and install dependencies
          sudo apt-get update -qq
          sudo apt-get install -y jq git bash

          # Ensure git is properly configured for test environment
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Runner"

      - name: Run BATS test suite
        run: bash tests/run-all.sh

      - name: Run test quality audit
        run: bash scripts/audit-test-quality.sh --summary

      - name: "Gate: Test Quality (SPEC-055 — all tests >= 80)"
        run: bash scripts/ci-test-quality-gate.sh

      - name: Run coverage report
        run: bash scripts/coverage-report.sh --ci

      - name: Run security scan
        run: bash scripts/security-scan.sh --ci

      - name: Run vulnerability scan
        run: bash scripts/vuln-scan.sh --ci

      - name: Run extended CI checks
        run: bash scripts/ci-extended-checks.sh

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Lint Markdown (native — no npm dependency)
        run: |
          python3 -m scripts.markdownlint \
            --config .markdownlint.json \
            CHANGELOG.md README.md README.en.md || true
        # 'true' keeps CI green while the team establishes linting baseline.
        # Expand file list as files are fixed. Remove '|| true' when all pass.

      - name: Validate file sizes (≤150 lines)
        run: |
          echo "Validating file sizes..."
          FAILED=0
          # Check skills
          for file in .opencode/skills/*/SKILL.md; do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              if [ "$lines" -gt 150 ]; then
                echo "❌ FAIL: $file ($lines líneas)"
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          # Check agents
          for file in .opencode/agents/*.md; do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              if [ "$lines" -gt 150 ]; then
                echo "❌ FAIL: $file ($lines líneas)"
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          # Check domain rules
          for file in .claude/rules/domain/*.md; do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              if [ "$lines" -gt 150 ]; then
                echo "⚠️  WARNING: $file ($lines líneas)"
              fi
            fi
          done
          # Check commands
          for file in .opencode/commands/*.md; do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              if [ "$lines" -gt 150 ]; then
                echo "❌ FAIL: $file ($lines líneas)"
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "$FAILED ficheros exceden 150 líneas."
            exit 1
          fi
          echo "✅ All files within 150 lines limit."

      - name: Validate settings.json JSON schema
        run: |
          echo "Validating .claude/settings.json..."
          python3 -c "import json; json.load(open('.claude/settings.json'))" && \
            echo "✅ settings.json is valid JSON" || \
            { echo "❌ settings.json is invalid JSON"; exit 1; }

      - name: Validate command frontmatter
        run: |
          echo "Validating command frontmatter..."
          FAILED=0
          WARNED=0
          for file in .opencode/commands/*.md; do
            if [ -f "$file" ]; then
              if head -1 "$file" | grep -q "^---$"; then
                # Has frontmatter → validate required fields
                if ! grep -q "^name:" "$file"; then
                  echo "❌ FAIL: $file missing 'name' field"
                  FAILED=$((FAILED + 1))
                fi
                if ! grep -q "^description:" "$file"; then
                  echo "❌ FAIL: $file missing 'description' field"
                  FAILED=$((FAILED + 1))
                fi
              else
                # Legacy command without frontmatter → warning only
                echo "⚠️  WARNING: $file has no frontmatter (legacy)"
                WARNED=$((WARNED + 1))
              fi
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "$FAILED command(s) have invalid frontmatter."
            exit 1
          fi
          echo "✅ Frontmatter valid ($WARNED legacy commands without frontmatter)."

  hook-perf-gate:
    name: Hook Latency Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq python3

      - name: Run hook latency benchmark (strict — fail if any hook > 200ms)
        run: bash scripts/hook-latency-bench.sh --iterations 3 --threshold 200 --strict
