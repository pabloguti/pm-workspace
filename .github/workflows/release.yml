name: Release (Manual / Fallback)

# NOTE: The primary release mechanism is auto-tag.yml, which creates both
# the git tag AND the GitHub release in a single workflow whenever
# CHANGELOG.md is updated on main. This file remains as a fallback for
# manual releases triggered by pushing a tag directly (without going
# through CHANGELOG.md edits), but auto-tag.yml is the preferred path.
#
# Why auto-tag.yml handles both: GitHub Actions has a safeguard where
# workflows triggered by GITHUB_TOKEN pushes DO NOT trigger other
# workflows. This means tags pushed by auto-tag.yml would not trigger
# this release.yml, causing the release creation to silently skip. The
# fix is to do both in auto-tag.yml.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release (fallback for manual tag pushes)
    runs-on: ubuntu-latest
    # Skip if the tag was pushed by github-actions[bot] — auto-tag.yml
    # already handles that case inline. This prevents duplicate work and
    # is also technically a no-op because GITHUB_TOKEN actions don't
    # trigger this workflow anyway, but we document the intent.
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid tag format: $TAG"
            echo "Expected format: vX.Y.Z"
            exit 1
          fi
          echo "✅ Valid tag format: $TAG"

      - name: Check if release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        if: steps.release_check.outputs.exists == 'false'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SEMVER="${VERSION#v}"

          awk "/^## \[${SEMVER}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md \
            > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for version ${SEMVER}." > release_notes.md
            echo "See CHANGELOG.md for full history." >> release_notes.md
          fi

      - name: Create GitHub Release
        if: steps.release_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          name: "PM Workspace ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
